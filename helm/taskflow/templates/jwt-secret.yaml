apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-jwt-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  jwt-secret: {{ .Values.global.jwtSecret | quote }}
