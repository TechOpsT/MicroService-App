apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "postgres.name" . }}-pvc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.storage.size }}
