apiVersion: v1
kind: Service
metadata:
  name: {{ include "api-gateway.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "api-gateway.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "api-gateway.selectorLabels" . | nindent 4 }}
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
