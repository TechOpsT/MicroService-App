apiVersion: v1
kind: Service
metadata:
  name: {{ include "task-service.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "task-service.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "task-service.selectorLabels" . | nindent 4 }}
  ports:
    - port: 80
      targetPort: 5000
      protocol: TCP
      name: http
