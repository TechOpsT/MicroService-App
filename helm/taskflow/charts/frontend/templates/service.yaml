apiVersion: v1
kind: Service
metadata:
  name: {{ include "frontend.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "frontend.selectorLabels" . | nindent 4 }}
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
