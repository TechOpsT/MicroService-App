# Global values shared across all sub-charts
global:
  imageRegistry: ""        # prefix for all images, e.g. "ghcr.io/yourname/"
  imagePullPolicy: IfNotPresent
  jwtSecret: "change-me-in-production"

postgres:
  image:
    repository: postgres
    tag: "15-alpine"
  auth:
    database: taskflow
    username: taskflow
    password: taskflow_pass
  storage:
    size: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

user-service:
  replicaCount: 2
  image:
    repository: taskflow/user-service
    tag: latest
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

task-service:
  replicaCount: 2
  image:
    repository: taskflow/task-service
    tag: latest
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

api-gateway:
  replicaCount: 2
  image:
    repository: taskflow/api-gateway
    tag: latest
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

frontend:
  replicaCount: 1
  image:
    repository: taskflow/frontend
    tag: latest
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

ingress:
  host: taskflow.local
